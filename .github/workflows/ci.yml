name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Format check
        run: test -z "$(gofmt -l cmd internal)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -o bin/linux-nixer ./cmd/linux-nixer

  nix-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: DeterminateSystems/determinate-nix-action@v3
      - name: Build linux-nixer
        run: go build -o bin/linux-nixer ./cmd/linux-nixer
      - name: Capture this runner (scan, auto-safe review, generate)
        run: bin/linux-nixer capture --out linux-nixer-output
      # Standard GitHub-hosted runners have no /dev/kvm (no nested
      # virtualization), but this project never sets
      # virtualisation.qemu.forceAccel, so the generated VM script uses
      # nixpkgs' default `-machine accel=kvm:tcg` — QEMU probes for KVM and
      # automatically falls back to software emulation (TCG) rather than
      # failing outright when /dev/kvm is absent. So --boot is attempted
      # here with a longer timeout to give a TCG boot a real chance, not
      # skipped outright; if it turns out too slow/flaky in practice,
      # dropping back to --vm-only should be based on that evidence rather
      # than the previous (incorrect) assumption that booting without KVM
      # was a hard failure.
      - name: Doctor (nix flake check + VM build + boot)
        run: bin/linux-nixer doctor --project linux-nixer-output/nix-config --vm --boot --timeout 5m --host generated
